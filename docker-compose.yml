services:
  all-in-one:
    build: .
    command: npm run start:all
    profiles:
      - all-in-one
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/wemsty
      REDIS_URL: redis://redis:6379
      REQUIRE_REDIS: "false"
    depends_on:
      - mongo
      - redis

  api:
    build: .
    command: npm start
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/wemsty
      REDIS_URL: redis://redis:6379
      REQUIRE_REDIS: "false"
    depends_on:
      - mongo
      - redis

  worker:
    build: .
    command: npm run worker
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/wemsty
      REDIS_URL: redis://redis:6379
      REQUIRE_REDIS: "false"
    depends_on:
      - mongo
      - redis

  scheduler:
    build: .
    command: npm run scheduler
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/wemsty
      REDIS_URL: redis://redis:6379
      REQUIRE_REDIS: "false"
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mongo-data:
  redis-data:
